services:
  - type: web
    name: stratabin-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: strategybox-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/strategybox.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
