        "name": "Is Stratabin free to use?",

          "@type": "Answer",
          "text": "Stratabin is free to use. Create an account to access the full workspace; STRAB AI uses a fair daily limit per account."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use Stratabin on my phone?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Stratabin is a Progressive Web App (PWA) that can be installed on any smartphone — iPhone, Android, or tablet — for a native app-like experience. It also works on desktop browsers."
        }
      },
      {
        "@type": "Question",
        "name": "What makes Stratabin different from other planning tools?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Unlike traditional project management tools that only track tasks, Stratabin bridges the gap between ideation and execution. You can write long-form strategies, branch ideas into visual flowcharts, merge projects, and get AI-powered insights — all in one unified workspace."

      },
      {
        "@type": "Question",
        "name": "Can I collaborate or merge multiple strategy projects?",

        }
      }
    ]
